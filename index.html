<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🏸 バドミントン コート振り分け</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#059669">
    <link rel="icon" href="icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="icon.svg">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="コート割">
    <meta name="mobile-web-app-capable" content="yes">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg: #f0f4f8;
            --surface: #ffffff;
            --surface2: #e8eef4;
            --border: #c8d6e0;
            --accent: #059669;
            --accent2: #047857;
            --male: #2563eb;
            --female: #be185d;
            --guest: #d97706;
            --text: #1e293b;
            --muted: #64748b;
            --red: #dc2626;
            --absent: #94a3b8;
        }

        body {
            font-family: 'Noto Sans JP', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ── Header ── */
        .header {
            background: linear-gradient(135deg, #ffffff, #e8f5f0, #f0f9ff);
            border-bottom: 1px solid var(--border);
            padding: 14px 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 200;
            box-shadow: 0 2px 12px #00000012;
        }

        .logo {
            width: 38px;
            height: 38px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }

        h1 {
            font-size: 18px;
            font-weight: 900;
            margin-left: 12px;
            background: linear-gradient(to right, #059669, #2563eb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hstats {
            display: flex;
            gap: 8px;
        }

        .badge {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 4px 12px;
            font-size: 12px;
            color: var(--muted);
        }

        .badge b {
            color: var(--accent);
        }

        /* ── Layout ── */
        .app {
            display: flex;
            min-height: calc(100vh - 67px);
        }

        /* ── Sidebar ── */
        .sidebar {
            width: 220px;
            min-width: 220px;
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }

        .sb-head {
            padding: 12px 14px;
            border-bottom: 1px solid var(--border);
            background: var(--surface2);
            font-size: 12px;
            font-weight: 700;
            color: var(--muted);
            letter-spacing: .06em;
            text-transform: uppercase;
        }

        .sb-body {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .sec-label {
            font-size: 10px;
            color: var(--muted);
            font-weight: 700;
            letter-spacing: .08em;
            text-transform: uppercase;
            padding: 6px 2px 6px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .sec-label.male {
            color: var(--male);
        }

        .sec-label.female {
            color: var(--female);
        }

        .sec-label.guest {
            color: var(--guest);
        }

        .sec-label::before {
            content: '';
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: currentColor;
            flex-shrink: 0;
        }

        /* ── Chip ── */
        .chip {
            display: flex;
            align-items: center;
            gap: 7px;
            padding: 7px 9px;
            border-radius: 8px;
            margin-bottom: 4px;
            cursor: grab;
            user-select: none;
            border: 1px solid transparent;
            background: var(--surface2);
            transition: all .15s;
            touch-action: none;
            position: relative;
        }

        .chip.male {
            border-color: #2563eb30;
        }

        .chip.female {
            border-color: #be185d30;
        }

        .chip.guest {
            border-color: #d9770630;
        }

        .chip:hover {
            transform: translateX(2px);
            border-color: var(--accent);
            background: #05966914;
        }

        .chip.selected {
            border-color: var(--accent);
            background: #05966920;
            box-shadow: 0 0 0 2px #05966948;
        }

        .chip.dragging {
            opacity: .25;
        }

        .av {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 700;
            flex-shrink: 0;
        }

        .male .av {
            background: #2563eb18;
            color: var(--male);
        }

        .female .av {
            background: #be185d18;
            color: var(--female);
        }

        .guest .av {
            background: #d9770618;
            color: var(--guest);
        }

        .cn {
            font-size: 13px;
            font-weight: 500;
            flex: 1;
        }

        .dh {
            color: var(--border);
            font-size: 13px;
        }

        /* ── Guest inputs ── */
        .g-section {
            border-top: 1px solid var(--border);
            padding: 8px 12px;
            background: #fbbf2410;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .g-row {
            display: flex;
            align-items: center;
            gap: 5px;
            flex: 1;
        }

        .g-toggle {
            width: 20px;
            height: 20px;
            border-radius: 4px;
            border: 2px solid var(--guest);
            background: transparent;
            cursor: pointer;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .g-toggle.on {
            background: var(--guest);
        }

        .g-toggle.on::after {
            content: '✓';
            color: #000;
            font-size: 10px;
            font-weight: 900;
        }

        .g-inp {
            flex: 1;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 6px 8px;
            color: var(--text);
            font-size: 12px;
            font-family: inherit;
        }

        .g-inp:focus {
            outline: none;
            border-color: var(--guest);
        }

        .g-inp:disabled {
            opacity: .35;
        }

        /* ── Tournament pair section ── */
        .tp-section {
            border: 1px solid #fed7aa;
            border-radius: 12px;
            background: #fff7ed;
            margin-top: 4px;
            overflow: hidden;
        }

        .tp-summary {
            list-style: none;
            cursor: pointer;
            padding: 10px 14px;
            font-size: 13px;
            font-weight: 700;
            color: #b45309;
            display: flex;
            align-items: center;
            gap: 8px;
            min-height: 48px;
            background: linear-gradient(135deg, #fef3c7, #fff7ed);
            border-bottom: 1px solid transparent;
            transition: background .15s;
            user-select: none;
        }

        .tp-section[open] .tp-summary {
            border-bottom-color: #fed7aa;
        }

        .tp-summary:hover,
        .tp-summary:active {
            background: linear-gradient(135deg, #fde68a, #fef3c7);
        }

        .tp-summary::-webkit-details-marker { display: none; }

        .tp-summary-handle {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            height: 4px;
            background: #d97706;
            border-radius: 2px;
            opacity: .5;
            flex-shrink: 0;
        }

        .tp-summary-arrow {
            margin-left: auto;
            font-size: 11px;
            color: #b45309;
            transition: transform .2s;
            min-width: 20px;
            text-align: center;
        }

        .tp-section[open] .tp-summary-arrow {
            transform: rotate(180deg);
        }

        .tp-summary-label {
            flex-shrink: 1;
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .tp-edit-name {
            min-width: 32px;
            min-height: 32px;
            border: none;
            background: transparent;
            color: #b45309;
            font-size: 13px;
            cursor: pointer;
            border-radius: 6px;
            padding: 4px;
            flex-shrink: 0;
        }

        .tp-edit-name:hover {
            background: #fed7aa;
        }

        .tp-count {
            font-size: 10px;
            font-weight: 700;
            color: #b45309;
            background: #fed7aa;
            padding: 2px 8px;
            border-radius: 10px;
        }

        .tp-body {
            padding: 8px 12px 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            border-top: 1px solid #fed7aa;
        }

        .tp-list {
            display: flex;
            flex-direction: column;
            gap: 4px;
            max-height: 180px;
            overflow-y: auto;
        }

        .tp-list:empty::after {
            content: 'まだ大会ペアが登録されていません';
            font-size: 10px;
            color: var(--muted);
            padding: 4px 0;
        }

        .tp-item {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 8px;
            background: #fff;
            border: 1px solid #fed7aa;
            border-radius: 6px;
            font-size: 11px;
        }

        .tp-item-names {
            flex: 1;
            font-weight: 500;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }

        .tp-badge {
            display: inline-block;
            background: #fef3c7;
            color: #b45309;
            border: 1px solid #f59e0b;
            border-radius: 8px;
            padding: 1px 7px;
            font-size: 10px;
            font-weight: 700;
            white-space: nowrap;
        }

        .tp-label-input {
            flex: 1;
            min-height: 36px;
            padding: 4px 8px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: #fff;
            font-size: 11px;
            font-family: inherit;
            color: var(--text);
            min-width: 0;
        }

        .tp-label-input:focus {
            outline: none;
            border-color: #f59e0b;
        }

        .tp-del {
            min-width: 44px;
            min-height: 44px;
            width: 44px;
            height: 44px;
            border: none;
            background: transparent;
            color: var(--red);
            cursor: pointer;
            font-size: 14px;
            font-weight: 700;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: -10px -8px -10px 0;
        }

        .tp-del:hover {
            background: #fee2e2;
        }

        .tp-add {
            display: flex;
            gap: 4px;
            align-items: stretch;
        }

        .tp-sel {
            flex: 1;
            min-height: 36px;
            padding: 4px 6px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: #fff;
            font-size: 11px;
            font-family: inherit;
            color: var(--text);
            min-width: 0;
        }

        .tp-add-btn {
            min-width: 44px;
            min-height: 36px;
            padding: 4px 10px;
            border: 1px solid #f59e0b;
            background: #fef3c7;
            color: #b45309;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 900;
            font-family: inherit;
        }

        .tp-add-btn:active {
            background: #f59e0b;
            color: #fff;
        }

        .tp-actions {
            display: flex;
            gap: 6px;
        }

        .tp-apply {
            flex: 1;
            min-height: 44px;
            padding: 8px 10px;
            border: 1px solid #f59e0b;
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: #fff;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 700;
            font-family: inherit;
        }

        .tp-apply:active {
            transform: translateY(1px);
            box-shadow: inset 0 2px 4px rgba(0,0,0,.15);
        }

        .tp-release {
            min-height: 44px;
            min-width: 60px;
            padding: 8px 10px;
            border: 1px solid #fed7aa;
            background: #fff;
            color: #b45309;
            border-radius: 6px;
            cursor: pointer;
            font-size: 11px;
            font-family: inherit;
        }

        .tp-release:active {
            background: #fef3c7;
        }

        /* ── Courts area ── */
        .courts-area {
            flex: 1;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            min-width: 0;
        }

        .ctrl {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
        }

        .pl {
            font-size: 11px;
            color: var(--muted);
            font-weight: 700;
        }

        .pbtn {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 5px 11px;
            color: var(--muted);
            font-size: 11px;
            cursor: pointer;
            transition: all .2s;
            font-family: inherit;
        }

        .pbtn:hover,
        .pbtn.on {
            border-color: var(--accent);
            color: var(--accent);
            background: #05966912;
        }

        .sbtn {
            background: #6366f112;
            border: 1px solid #6366f140;
            border-radius: 6px;
            padding: 5px 11px;
            color: #4f46e5;
            font-size: 11px;
            cursor: pointer;
            transition: all .2s;
            font-family: inherit;
        }

        .sbtn:hover {
            background: #6366f120;
        }

        .savebtn {
            background: #05966912;
            border: 1px solid #05966940;
            border-radius: 6px;
            padding: 5px 11px;
            color: var(--accent);
            font-size: 11px;
            cursor: pointer;
            transition: all .2s;
            font-family: inherit;
            font-weight: 700;
        }

        .savebtn:hover {
            background: #05966920;
        }

        .rbtn {
            margin-left: auto;
            background: #dc262610;
            border: 1px solid #dc262630;
            border-radius: 6px;
            padding: 5px 11px;
            color: var(--red);
            font-size: 11px;
            cursor: pointer;
            transition: all .2s;
            font-family: inherit;
        }

        .rbtn:hover {
            background: #dc262620;
        }

        /* ── Absent section ── */
        .absent-section {
            border-top: 1px solid var(--border);
            padding: 6px 12px;
            background: #94a3b810;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .sec-label.absent {
            color: var(--absent);
            flex-shrink: 0;
        }

        .absent-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            flex: 1;
            min-height: 24px;
        }

        .absent-chips:empty::after {
            content: '欠席者はいません';
            font-size: 11px;
            color: var(--muted);
        }

        .chip.absent-chip {
            border-color: #94a3b830;
            opacity: .65;
        }

        .chip.absent-chip .av {
            background: #94a3b818;
            color: var(--absent);
        }

        .abs-btn {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            font-size: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all .15s;
            margin-left: auto;
        }

        .abs-btn.to-absent {
            background: #94a3b820;
            color: var(--absent);
            opacity: 0;
        }

        .chip:hover .abs-btn.to-absent {
            opacity: 1;
        }

        .abs-btn.to-return {
            background: #10b98120;
            color: var(--accent);
        }

        .abs-btn:hover {
            transform: scale(1.2);
        }

        /* タップ判定を44px以上に拡張（見た目はそのまま） */
        .abs-btn,
        .delbtn,
        .unpair-btn,
        .g-toggle {
            position: relative;
        }

        .abs-btn::before,
        .delbtn::before,
        .unpair-btn::before,
        .g-toggle::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 44px;
            height: 44px;
            min-width: 100%;
            min-height: 100%;
        }

        @media (hover: none) {
            .abs-btn.to-absent {
                opacity: 1;
            }
        }

        /* ── Courts grid ── */
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            flex: 1;
        }

        /* ── Court card ── */
        .card {
            background: #ffffff;
            border: 2px solid var(--border);
            border-radius: 14px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: border-color .2s;
            min-height: 260px;
        }

        .card.wide {
            grid-column: span 2;
            min-height: 280px;
        }

        .card.hover {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px #05966930, inset 0 0 20px #05966908;
        }

        .card.full {
            border-color: #ef444460;
        }

        .card-head {
            padding: 10px 14px;
            background: linear-gradient(135deg, #e8eef4, #f5f7fa);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .cname {
            background: transparent;
            border: none;
            color: var(--text);
            font-size: 14px;
            font-weight: 700;
            font-family: inherit;
            flex: 1;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: border-color .2s;
            padding: 2px 4px;
        }

        .cname:focus {
            outline: none;
            border-bottom-color: var(--accent);
            cursor: text;
        }

        .cnt {
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 10px;
            font-weight: 700;
            flex-shrink: 0;
        }

        .cnt.ok {
            background: #05966918;
            color: var(--accent);
        }

        .cnt.full {
            background: #dc262618;
            color: var(--red);
        }

        .card-body {
            flex: 1;
            padding: 10px;
            display: flex;
            flex-wrap: wrap;
            align-content: flex-start;
            gap: 5px;
            position: relative;
            min-height: 180px;
        }

        .drop-hint {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: var(--border);
            font-size: 11px;
            pointer-events: none;
        }

        .drop-hint div:first-child {
            font-size: 22px;
            margin-bottom: 4px;
        }

        /* ── Court member ── */
        .cmem {
            display: flex;
            align-items: center;
            gap: 7px;
            padding: 6px 9px;
            border-radius: 7px;
            background: var(--surface2);
            border: 1px solid var(--border);
            cursor: grab;
            touch-action: none;
            user-select: none;
            transition: all .15s;
            animation: fadeIn .2s ease;
        }

        .cmem:hover {
            border-color: var(--accent);
            background: #05966910;
        }

        .cmem.male {
            border-left: 3px solid var(--male);
        }

        .cmem.female {
            border-left: 3px solid var(--female);
        }

        .cmem.guest {
            border-left: 3px solid var(--guest);
        }

        .cmem.dragging {
            opacity: .2;
        }

        .cmem.selected {
            border-color: var(--accent);
            background: #05966918;
        }

        .delbtn {
            margin-left: auto;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #dc262618;
            color: var(--red);
            border: none;
            cursor: pointer;
            font-size: 11px;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity .15s;
            flex-shrink: 0;
        }

        .cmem:hover .delbtn {
            opacity: 1;
        }

        /* ── Pair ── */
        .pair-group {
            display: flex;
            align-items: stretch;
            gap: 0;
            border-radius: 10px;
            overflow: visible;
            animation: fadeIn .2s ease;
            position: relative;
            border: 2px solid transparent;
            transition: box-shadow .15s ease, transform .15s ease;
        }
        .pair-group.pair-selected {
            box-shadow: 0 0 0 3px #3b82f6, 0 4px 12px rgba(59,130,246,0.4);
            transform: scale(1.02);
        }

        .pair-group .cmem {
            border-radius: 0;
            animation: none;
            border: none;
            border-left: none;
        }

        .pair-group .cmem:first-child {
            border-radius: 8px 0 0 8px;
        }

        .pair-group .cmem:last-child {
            border-radius: 0 8px 8px 0;
        }

        .pair-connector {
            width: 28px;
            min-width: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 900;
            color: #fff;
            flex-shrink: 0;
        }

        .unpair-btn {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: #ef4444;
            color: #fff;
            border: 2px solid #ffffff;
            cursor: pointer;
            font-size: 10px;
            font-weight: 900;
            display: flex;
            align-items: center;
            justify-content: center;
            position: absolute;
            top: -8px;
            right: -8px;
            z-index: 10;
            opacity: 0;
            transition: opacity .15s;
            box-shadow: 0 2px 6px rgba(0, 0, 0, .4);
        }

        .pair-group:hover .unpair-btn {
            opacity: 1;
        }

        /* スマホではタッチしやすいよう常時表示 */
        @media (hover: none) {
            .unpair-btn {
                opacity: 1;
            }
        }

        /* ── Drag ghost ── */
        #ghost {
            position: fixed;
            z-index: 9999;
            pointer-events: none;
            display: none;
            background: var(--surface2);

            white-space: nowrap;
            box-shadow: 0 8px 30px #00000020;
            transform: rotate(2deg);
            transition: transform .1s;

        }

        /* ── Toast ── */
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--surface2);
            border: 1px solid var(--accent);
            border-radius: 10px;
            padding: 10px 16px;
            font-size: 13px;
            z-index: 9998;
            animation: fadeIn .3s;
            box-shadow: 0 4px 20px #00000015;
        }

        /* ── Pair hint ── */
        .pair-hint {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #8b5cf6, #6d28d9);
            border: 1px solid #a78bfa;
            border-radius: 12px;
            padding: 10px 20px;
            font-size: 13px;
            font-weight: 700;
            z-index: 300;
            animation: fadeIn .3s;
            box-shadow: 0 4px 20px #00000060;
            white-space: nowrap;
        }

        /* ── Scrollbar ── */
        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-track {
            background: var(--surface);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 2px;
        }

        /* ── Anims ── */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-6px);
            }

            to {
                opacity: 1;
                transform: none;
            }
        }

        /* ── Mobile ── */
        @media(max-width:768px) {
            .app {
                flex-direction: column;
            }

            .header {
                padding: 8px 10px;
            }

            .logo {
                width: 28px;
                height: 28px;
                font-size: 15px;
                border-radius: 7px;
            }

            h1 {
                font-size: 13px;
                margin-left: 8px;
            }

            .sidebar {
                width: 100%;
                min-width: 0;
                border-right: none;
                border-bottom: 1px solid var(--border);

            .sb-head {
                padding: 6px 10px;

            }

            .sb-body {
                display: flex;
                flex-wrap: wrap;
                gap: 3px;
                max-height: none;
                padding: 5px;
                overflow-y: auto;
            }

            .sec-label {
                font-size: 8px;

            }

            .absent-chips:empty::after {

            }

            /* Courts area */

            .drop-hint div:first-child {

        /* ── Floating assign bar ── */

        /* ── Court collapse handle (mobile) ── */
