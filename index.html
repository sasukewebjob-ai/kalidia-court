    </style>
</head>

<body>
    <div id="ghost"></div>

    <header class="header">
        <div style="display:flex;align-items:center;">
            <div class="logo">🏸</div>
            <h1>コート振り分け</h1>
        </div>
        <div class="hstats">
            <div class="badge">参加: <b id="totalC">0</b>名</div>
            <div class="badge">未割当: <b id="unassC">0</b>名</div>
        </div>
    </header>

    <div class="app">
        <!-- Sidebar -->
        <aside class="sidebar">
            <!-- Guest section -->
            <div class="g-section">
                <div class="sec-label guest" style="flex-shrink:0;">🎟️ ゲスト</div>
                <div id="guestArea" style="display:flex;gap:4px;flex:1;"></div>
            </div>
            <!-- Absent section -->
            <div class="absent-section">
                <div class="sec-label absent">🚫 欠席者</div>
                <div class="absent-chips" id="absentArea"></div>
            </div>
            <div class="sb-head">👥 メンバー一覧</div>
            <div class="sb-body" id="pool"></div>
        </aside>

        <!-- Court toggle handle (mobile) -->
        <div class="court-handle" id="courtHandle" onclick="toggleCourts()">
            <span class="handle-arrow">▼</span>
            <span class="handle-label">コートエリア</span>
            <div class="handle-bar"></div>
        </div>

        <!-- Courts -->
        <main class="courts-area" id="courtsArea">
            <div class="ctrl">
                <span class="pl">コート設定:</span>
                <button class="pbtn on" data-preset="0" onclick="applyPreset(0)">4コート</button>
                <button class="pbtn" data-preset="1" onclick="applyPreset(1)">2コート（12人）</button>
                <button class="pbtn" data-preset="2" onclick="applyPreset(2)">3コート（12人+6人×2）</button>
                <button class="sbtn" onclick="swapCourts()">🔃 上下入替</button>
                <button class="savebtn" onclick="saveState(true)">💾 保存</button>
                <button class="sbtn" onclick="screenshotCourts()" style="background:#6366f1;color:#fff;">📸 撮影</button>
                <button class="rbtn" onclick="resetAll()">🔄 リセット</button>
            </div>
            <div class="grid" id="grid"></div>

            <!-- Tournament pair section（コート割の下に配置） -->
            <details class="tp-section" id="tpSection">
                <summary class="tp-summary">
                    <span class="tp-summary-handle"></span>
                    <span class="tp-summary-label" id="tpTitle">🏆 大会ペア</span>
                    <button class="tp-edit-name" id="tpEditNameBtn" title="大会名を編集">✏️</button>
                    <span class="tp-count" id="tpCount">0組</span>
                    <span class="tp-summary-arrow">▼</span>
                </summary>
                <div class="tp-body">
                    <div class="tp-list" id="tpList"></div>
                    <div class="tp-add">
                        <select class="tp-sel" id="tpSelA"><option value="">選手A</option></select>
                        <select class="tp-sel" id="tpSelB"><option value="">選手B</option></select>
                        <button class="tp-add-btn" id="tpAddBtn">+</button>
                    </div>
                    <div class="tp-actions">
                        <button class="tp-apply" id="tpApplyBtn">🏆 大会ペアを適用</button>
                        <button class="tp-release" id="tpReleaseBtn" title="出場中の大会ペアをすべて解除">解除</button>
                    </div>
                </div>
            </details>
        </main>
    </div>

    <!-- Pair hint banner -->
    <div id="pairHint" class="pair-hint" style="display:none;"></div>

    <!-- Floating assign bar -->
    <div id="assignBar" class="assign-bar"></div>

    <script>
        // ── DATA ──────────────────────────────────────────────
        const RAW = {
            male: [                '大野', '唐澤', '北原', '越野', '小林', '善志',
                '高橋', '張', '原', '平澤', 'バレ', '根津',
                '細井', '松武', '宮澤輝', '渡辺'],
            female: [                '濱島', '内田', '春日', '黒河内', '後藤', '下平',
                '田中', '宮澤真', '宮下', '依田']
        };

        // Presets: each court {name, max, wide}
        const PRESETS = [
            // 0: 4コート (4 x 6)
            [{ name: 'コートA', max: 6, wide: false }, { name: 'コートB', max: 6, wide: false },
            { name: 'コートC', max: 6, wide: false }, { name: 'コートD', max: 6, wide: false }],
            // 1: 2コート (2 x 12)
            [{ name: 'コートA（2面）', max: 12, wide: true }, { name: 'コートB（2面）', max: 12, wide: true }],
            // 2: 3コート (12人 + 6人×2)
            [{ name: 'コートA（2面）', max: 12, wide: true },
            { name: 'コートB', max: 6, wide: false }, { name: 'コートC', max: 6, wide: false }],
        ];

        // ペアの背景色（はっきり区別できる6色）
        const PAIR_BG_COLORS = [
            { bg: 'rgba(245, 158, 11, 0.25)', border: '#f59e0b', connector: '#f59e0b' },  // オレンジ
            { bg: 'rgba(139, 92, 246, 0.25)', border: '#8b5cf6', connector: '#8b5cf6' },  // パープル
            { bg: 'rgba(6, 182, 212, 0.25)', border: '#06b6d4', connector: '#06b6d4' },  // シアン
            { bg: 'rgba(236, 72, 153, 0.25)', border: '#ec4899', connector: '#ec4899' },  // ピンク
            { bg: 'rgba(132, 204, 22, 0.25)', border: '#84cc16', connector: '#84cc16' },  // ライム
            { bg: 'rgba(249, 115, 22, 0.25)', border: '#f97316', connector: '#f97316' },  // ダークオレンジ
        ];

        // ── STATE ─────────────────────────────────────────────
        let people = [];
        let courts = [];   // {id, name, max, wide, pids:[], pairs:[[pidA,pidB],...]}
        let guests = [];
        let sel = [];       // selected person ids for tap-assign (multiple)
        let pairSel = null; // selected person id for pairing (within court)
        let currentPreset = 0;
        let tournamentPairs = []; // [{id, pidA, pidB}] シーズン中ずっと永続
        let tournamentName = ''; // 大会名（任意）
        const STORAGE_KEY = 'badminton_court_state_v1';
        const TOURNAMENT_KEY = 'badminton_tournament_pairs_v1';

        function initState() {
            let n = 1;
            people = [
                ...RAW.male.map(name => ({ id: 'm' + (n++), name, gender: 'male', courtId: null, absent: false })),
                ...RAW.female.map(name => ({ id: 'm' + (n++), name, gender: 'female', courtId: null, absent: false }))
            ];
            courts = PRESETS[0].map((p, i) => ({ id: 'c' + i, name: p.name, max: p.max, wide: p.wide, pids: [], pairs: [] }));
            guests = [1, 2].map(i => ({ id: 'g' + i, name: '', enabled: false, courtId: null }));
        }

        function updatePresetButtons() {
            document.querySelectorAll('.pbtn[data-preset]').forEach((b) => {
                b.classList.toggle('on', b.dataset.preset === String(currentPreset));
            });
        }

        function saveState(showToast = false) {
            try {
                const payload = {
                    version: 1,
                    savedAt: new Date().toISOString(),
                    currentPreset,
                    people,
                    guests,
                    courts
                };
                localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
                if (showToast) toast('この端末にコート割を保存しました。');
                return true;
            } catch (err) {
                console.error('Save failed:', err);
                if (showToast) toast('保存に失敗しました。ブラウザの空き容量を確認してください。');
                return false;
            }
        }

        function loadState() {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                if (!raw) return false;
                const saved = JSON.parse(raw);
                if (!saved || !Array.isArray(saved.people) || !Array.isArray(saved.guests) || !Array.isArray(saved.courts)) {
                    return false;
                }

                people = saved.people
                    .map(p => ({
                        id: typeof p.id === 'string' ? p.id : '',
                        name: typeof p.name === 'string' ? p.name : '',
                        gender: p.gender === 'female' ? 'female' : (p.gender === 'male' ? 'male' : ''),
                        courtId: typeof p.courtId === 'string' ? p.courtId : null,
                        absent: !!p.absent
                    }))
                    .filter(p => p.id && (p.gender === 'male' || p.gender === 'female'));

                guests = saved.guests
                    .map(g => ({
                        id: typeof g.id === 'string' ? g.id : '',
                        name: typeof g.name === 'string' ? g.name : '',
                        enabled: !!g.enabled,
                        courtId: typeof g.courtId === 'string' ? g.courtId : null
                    }))
                    .filter(g => g.id.startsWith('g'));

                currentPreset = Number.isInteger(saved.currentPreset) && PRESETS[saved.currentPreset]
                    ? saved.currentPreset
                    : 0;

                courts = saved.courts.map((c, i) => ({
                    id: typeof c.id === 'string' ? c.id : ('c' + i),
                    name: typeof c.name === 'string' && c.name.trim() ? c.name : ('コート' + (i + 1)),
                    max: Number.isInteger(c.max) && c.max > 0 ? c.max : 6,
                    wide: !!c.wide,
                    pids: Array.isArray(c.pids)
                        ? [...new Set(c.pids.filter(pid => typeof pid === 'string'))]
                        : [],
                    pairs: Array.isArray(c.pairs)
                        ? c.pairs
                            .filter(pair =>
                                Array.isArray(pair) &&
                                pair.length === 2 &&
                                typeof pair[0] === 'string' &&
                                typeof pair[1] === 'string' &&
                                pair[0] !== pair[1]
                            )
                            .map(pair => [pair[0], pair[1]])
                        : []
                }));

                if (people.length === 0 || courts.length === 0) return false;

                const validIds = new Set([...people, ...guests].map(p => p.id));
                const used = new Set();
                courts.forEach(c => {
                    c.pids = c.pids.filter(pid => validIds.has(pid) && !used.has(pid)).slice(0, c.max);
                    c.pids.forEach(pid => used.add(pid));
                    const pidSet = new Set(c.pids);
                    c.pairs = c.pairs.filter(([a, b]) => pidSet.has(a) && pidSet.has(b));
                });

                [...people, ...guests].forEach(p => { p.courtId = null; });
                courts.forEach(c => {
                    c.pids.forEach(pid => {
                        const p = findPerson(pid);
                        if (p) p.courtId = c.id;
                    });
                });

                guests.forEach(g => {
                    if (!g.enabled || !g.name.trim()) {
                        g.courtId = null;
                        courts.forEach(c => {
                            c.pids = c.pids.filter(pid => pid !== g.id);
                            c.pairs = c.pairs.filter(pair => !pair.includes(g.id));
                        });
                    }
                });

                sel = [];
                clearPairSel();
                updatePresetButtons();
                return true;
            } catch (err) {
                console.error('Load failed:', err);
                return false;
            }
        }

        function findPerson(id) { return people.find(p => p.id === id) || guests.find(g => g.id === id); }

        // ── 大会ペア（シーズン永続） ──────────────────────────
        function saveTournamentPairs() {
            try {
                localStorage.setItem(TOURNAMENT_KEY, JSON.stringify({ version: 1, tournamentName, tournamentPairs }));
                return true;
            } catch (err) {
                console.error('TournamentPairs save failed:', err);
                return false;
            }
        }

        function loadTournamentPairs() {
            try {
                const raw = localStorage.getItem(TOURNAMENT_KEY);
                if (!raw) return false;
                const saved = JSON.parse(raw);
                if (!saved || !Array.isArray(saved.tournamentPairs)) return false;
                tournamentName = typeof saved.tournamentName === 'string' ? saved.tournamentName : '';
                tournamentPairs = saved.tournamentPairs
                    .filter(tp => tp && typeof tp.pidA === 'string' && typeof tp.pidB === 'string' && tp.pidA !== tp.pidB)
                    .map(tp => ({
                        id: typeof tp.id === 'string' ? tp.id : ('tp' + Math.random().toString(36).slice(2, 8)),
                        pidA: tp.pidA,
                        pidB: tp.pidB
                    }));
                return true;
            } catch (err) {
                console.error('TournamentPairs load failed:', err);
                return false;
            }
        }

        function setTournamentName(name) {
            tournamentName = (name || '').trim().slice(0, 30);
            saveTournamentPairs();
            renderTournamentPairs();
        }

        function addTournamentPair(pidA, pidB) {
            if (!pidA || !pidB || pidA === pidB) {
                toast('同じ選手はペアにできません。');
                return false;
            }
            const pA = people.find(p => p.id === pidA);
            const pB = people.find(p => p.id === pidB);
            if (!pA || !pB) {
                toast('選手が見つかりません。');
                return false;
            }
            const dup = tournamentPairs.some(tp =>
                (tp.pidA === pidA && tp.pidB === pidB) ||
                (tp.pidA === pidB && tp.pidB === pidA)
            );
            if (dup) {
                toast('すでに登録済みのペアです。');
                return false;
            }
            const conflict = tournamentPairs.find(tp =>
                tp.pidA === pidA || tp.pidB === pidA || tp.pidA === pidB || tp.pidB === pidB
            );
            if (conflict) {
                const cA = findPerson(conflict.pidA);
                const cB = findPerson(conflict.pidB);
                toast(`${cA ? cA.name : '?'} - ${cB ? cB.name : '?'} のペアと重複しています。先に解除してください。`);
                return false;
            }
            tournamentPairs.push({
                id: 'tp' + Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
                pidA, pidB
            });
            saveTournamentPairs();
            renderTournamentPairs();
            toast(`🏆 ${pA.name} - ${pB.name} を大会ペアに追加`);
            return true;
        }

        function removeTournamentPair(tpId) {
            const before = tournamentPairs.length;
            tournamentPairs = tournamentPairs.filter(tp => tp.id !== tpId);
            if (tournamentPairs.length !== before) {
                saveTournamentPairs();
                renderTournamentPairs();
            }
        }

        function applyTournamentPairs() {
            if (tournamentPairs.length === 0) {
                toast('大会ペアが登録されていません。');
                return;
            }
            let applied = 0, skippedAbsent = 0, skippedNoSpace = 0;

            for (const tp of tournamentPairs) {
                const pA = people.find(p => p.id === tp.pidA);
                const pB = people.find(p => p.id === tp.pidB);
                if (!pA || !pB) continue;

                // 欠席者を含むペアは完全スキップ（出席している片方は通常メンバーとして残す）
                if (pA.absent || pB.absent) {
                    skippedAbsent++;
                    continue;
                }

                // 配置先コートを決定
                let targetCourt = null;
                if (pA.courtId && pA.courtId === pB.courtId) {
                    targetCourt = courts.find(c => c.id === pA.courtId);
                } else if (pA.courtId && !pB.courtId) {
                    targetCourt = courts.find(c => c.id === pA.courtId);
                } else if (pB.courtId && !pA.courtId) {
                    targetCourt = courts.find(c => c.id === pB.courtId);
                } else if (pA.courtId && pB.courtId) {
                    const cA = courts.find(c => c.id === pA.courtId);
                    const cB = courts.find(c => c.id === pB.courtId);
                    targetCourt = cA.pids.length <= cB.pids.length ? cA : cB;
                } else {
                    // 両方プール → 空きが最大のコートへ
                    targetCourt = courts.reduce((best, c) => {
                        const space = c.max - c.pids.length;
                        if (!best) return c;
                        const bestSpace = best.max - best.pids.length;
                        return space > bestSpace ? c : best;
                    }, null);
                }

                if (!targetCourt) {
                    skippedNoSpace++;
                    continue;
                }

                // 既存配置・ペアから両者を一旦剥がす
                courts.forEach(c => {
                    c.pids = c.pids.filter(id => id !== pA.id && id !== pB.id);
                    c.pairs = c.pairs.filter(pair => !pair.includes(pA.id) && !pair.includes(pB.id));
                });

                // targetCourt に配置 + ペア登録
                targetCourt.pids.push(pA.id, pB.id);
                pA.courtId = targetCourt.id;
                pB.courtId = targetCourt.id;
                targetCourt.pairs.push([pA.id, pB.id]);
                applied++;
            }

            saveState();
            render();

            let msg = `🏆 大会ペア ${applied}組を適用`;
            const notes = [];
            if (skippedAbsent > 0) notes.push(`欠席で${skippedAbsent}組スキップ`);
            if (skippedNoSpace > 0) notes.push(`空き不足で${skippedNoSpace}組スキップ`);
            if (notes.length) msg += `（${notes.join('、')}）`;
            toast(msg);
        }

        function releaseTournamentPairs() {
            let removed = 0;
            courts.forEach(c => {
                const before = c.pairs.length;
                c.pairs = c.pairs.filter(pair => {
                    const isTP = tournamentPairs.some(tp =>
                        (tp.pidA === pair[0] && tp.pidB === pair[1]) ||
                        (tp.pidA === pair[1] && tp.pidB === pair[0])
                    );
                    return !isTP;
                });
                removed += before - c.pairs.length;
            });
            if (removed > 0) {
                saveState();
                render();
                toast(`🏆 大会ペア ${removed}組を解除しました`);
            } else {
                toast('解除する大会ペアがありません。');
            }
        }

        function assign(pid, courtId) {
            const p = findPerson(pid);
            if (!p) return false;
            // エラーチェック: 欠席者はコートに割り当て不可
            if (p.absent) {
                toast(`${p.name}は欠席者です。復帰してから割り当ててください。`);
                return false;
            }
            // エラーチェック: ゲストの名前が空
            if (guests.includes(p) && (!p.name || !p.name.trim())) {
                toast('ゲスト名を入力してください。');
                return false;
            }
            const court = courts.find(c => c.id === courtId);
            if (!court) return false;
            // max超過は許容（ユーザーが手動で整理する前提）
            // Remove from old court (including pairs)
            removePidFromAllCourts(pid);
            p.courtId = courtId;
            court.pids.push(pid);
            return true;
        }

        function removePidFromAllCourts(pid) {
            courts.forEach(c => {
                c.pids = c.pids.filter(id => id !== pid);
                c.pairs = c.pairs.filter(pair => !pair.includes(pid));
            });
        }

        function removeFromCourt(pid) {
            removePidFromAllCourts(pid);
            const p = findPerson(pid);
            if (p) p.courtId = null;
            sel = [];
            clearPairSel();
            render();
        }

        function applyPreset(i) {
            currentPreset = i;
            const oldCourts = courts;
            const newCourts = PRESETS[i].map((p, j) => ({
                id: 'c' + j, name: p.name, max: p.max, wide: p.wide, pids: [], pairs: []
            }));

            if (newCourts.length === 0) {
                [...people, ...guests].forEach(p => p.courtId = null);
                courts = newCourts;
                updatePresetButtons();
                clearPairSel();
                render();
                return;
            }

            // 旧コート → 新コートへメンバー・ペアを引き継ぎ（消えるコートはmodで合流）
            oldCourts.forEach((oldC, oldIdx) => {
                const newIdx = oldIdx < newCourts.length ? oldIdx : (oldIdx % newCourts.length);
                const target = newCourts[newIdx];

                oldC.pids.forEach(pid => {
                    if (!target.pids.includes(pid)) target.pids.push(pid);
                    const person = findPerson(pid);
                    if (person) person.courtId = target.id;
                });

                oldC.pairs.forEach(pair => {
                    const dup = target.pairs.some(pp =>
                        (pp[0] === pair[0] && pp[1] === pair[1]) ||
                        (pp[0] === pair[1] && pp[1] === pair[0])
                    );
                    if (!dup) target.pairs.push([...pair]);
                });
            });

            courts = newCourts;
            updatePresetButtons();
            clearPairSel();
            render();
        }

        function resetAll() {
            [...people, ...guests].forEach(p => p.courtId = null);
            courts.forEach(c => { c.pids = []; c.pairs = []; });
            sel = [];
            clearPairSel();
            render();
        }

        // ── SWAP COURTS（全コート設定対応）──────────────────────
        function swapCourts() {
            // グリッドの行を判定（2カラムレイアウト）
            const rows = [];
            let currentRow = [];
            let colsUsed = 0;
            for (let i = 0; i < courts.length; i++) {
                const width = courts[i].wide ? 2 : 1;
                currentRow.push(i);
                colsUsed += width;
                if (colsUsed >= 2) {
                    rows.push(currentRow);
                    currentRow = [];
                    colsUsed = 0;
                }
            }
            if (currentRow.length > 0) rows.push(currentRow);

            if (rows.length < 2) {
                toast('入れ替えるコートがありません。');
                return;
            }

            // 上半分と下半分を判定
            const mid = Math.ceil(rows.length / 2);
            const topIndices = rows.slice(0, mid).flat();
            const bottomIndices = rows.slice(mid).flat();
            // 新しい順序: 下 → 上
            const newOrder = [...bottomIndices, ...topIndices];

            // 全コートデータを保存
            const savedData = courts.map(c => ({
                name: c.name, max: c.max, wide: c.wide,
                pids: [...c.pids], pairs: c.pairs.map(p => [...p])
            }));

            // 新しい順序でデータを適用
            newOrder.forEach((oldIdx, newIdx) => {
                const data = savedData[oldIdx];
                courts[newIdx].name = data.name;
                courts[newIdx].max = data.max;
                courts[newIdx].wide = data.wide;
                courts[newIdx].pids = data.pids;
                courts[newIdx].pairs = data.pairs;
                // courtIdを更新
                data.pids.forEach(pid => {
                    const p = findPerson(pid);
                    if (p) p.courtId = courts[newIdx].id;
                });
            });

            render();
            toast('上段と下段のコートを入れ替えました！');
        }

        // ── ABSENT ────────────────────────────────────────────────
        function markAbsent(pid) {
            const p = findPerson(pid);
            if (!p || guests.includes(p)) return;
            removePidFromAllCourts(pid);
            p.courtId = null;
            p.absent = true;
            sel = [];
            clearPairSel();
            render();
        }

        function markPresent(pid) {
            const p = findPerson(pid);
            if (!p) return;
            p.absent = false;
            render();
        }

        // ── PAIRING ───────────────────────────────────────────
        function makePair(courtId, pidA, pidB) {
            if (pidA === pidB) return;
            const court = courts.find(c => c.id === courtId);
            if (!court) return;
            // Check not already paired
            if (court.pairs.some(pair => pair.includes(pidA) || pair.includes(pidB))) {
                toast('すでにペアになっています。解除してからペアを組んでください。');
                return;
            }
            court.pairs.push([pidA, pidB]);
            clearPairSel();
            render();
        }

        function unpair(courtId, pairIndex) {
            const court = courts.find(c => c.id === courtId);
            if (!court) return;
            court.pairs.splice(pairIndex, 1);
            render();
        }

        function clearPairSel() {
            pairSel = null;
            document.getElementById('pairHint').style.display = 'none';
        }

        function getPairColorIdx(courtId, pairIdx) {
            return pairIdx % PAIR_BG_COLORS.length;
        }

        // ── RENDER ────────────────────────────────────────────
        function render() { renderPool(); renderAbsent(); renderCourts(); renderStats(); renderGuests(); renderTournamentPairs(); }

        function renderTournamentPairs() {
            const list = document.getElementById('tpList');
            const count = document.getElementById('tpCount');
            const selA = document.getElementById('tpSelA');
            const selB = document.getElementById('tpSelB');
            const title = document.getElementById('tpTitle');
            if (!list || !count || !selA || !selB) return;

            // セクションタイトル
            if (title) {
                title.textContent = tournamentName ? `🏆 ${tournamentName}ペア` : '🏆 大会ペア';
            }

            // 一覧
            list.innerHTML = '';
            tournamentPairs.forEach(tp => {
                const pA = findPerson(tp.pidA);
                const pB = findPerson(tp.pidB);
                const item = document.createElement('div');
                item.className = 'tp-item';
                const absentMark = (pA && pA.absent) || (pB && pB.absent) ? ' 🚫' : '';
                const names = document.createElement('div');
                names.className = 'tp-item-names';
                names.textContent = `${pA ? pA.name : '?'} ⇆ ${pB ? pB.name : '?'}${absentMark}`;
                item.appendChild(names);
                const del = document.createElement('button');
                del.className = 'tp-del';
                del.textContent = '×';
                del.title = 'このペアを削除';
                del.addEventListener('click', e => {
                    e.stopPropagation();
                    removeTournamentPair(tp.id);
                });
                item.appendChild(del);
                list.appendChild(item);
            });
            count.textContent = `${tournamentPairs.length}組`;

            // ドロップダウン更新（既登録者は除外して重複登録を防ぐ）
            const usedPids = new Set();
            tournamentPairs.forEach(tp => { usedPids.add(tp.pidA); usedPids.add(tp.pidB); });

            const prevA = selA.value;
            const prevB = selB.value;
            const buildOptions = (placeholder) => {
                const opts = [`<option value="">${placeholder}</option>`];
                people.forEach(p => {
                    if (usedPids.has(p.id)) return;
                    opts.push(`<option value="${p.id}">${p.name}（${p.gender === 'male' ? '男' : '女'}）</option>`);
                });
                return opts.join('');
            };
            selA.innerHTML = buildOptions('選手A');
            selB.innerHTML = buildOptions('選手B');
            if (!usedPids.has(prevA)) selA.value = prevA;
            if (!usedPids.has(prevB)) selB.value = prevB;
        }

        function renderStats() {
            const assigned = courts.reduce((s, c) => s + c.pids.length, 0);
            const total = people.length + guests.filter(g => g.enabled && g.name).length;
            document.getElementById('totalC').textContent = total;
            document.getElementById('unassC').textContent = Math.max(0, total - assigned);
        }

        function renderPool() {
            const el = document.getElementById('pool');
            el.innerHTML = '';
            const poolPeople = people.filter(p => !p.courtId && !p.absent);
            const poolGuests = guests.filter(g => g.enabled && g.name && !g.courtId);

            const malePool = poolPeople.filter(p => p.gender === 'male');
            const femalePool = poolPeople.filter(p => p.gender === 'female');

            if (malePool.length) {
                el.appendChild(mkLabel('male', '男性'));
                malePool.forEach(p => el.appendChild(mkChip(p)));
            }
            if (femalePool.length) {
                el.appendChild(mkLabel('female', '女性'));
                femalePool.forEach(p => el.appendChild(mkChip(p)));
            }
            if (poolGuests.length) {
                el.appendChild(mkLabel('guest', 'ゲスト'));
                poolGuests.forEach(g => el.appendChild(mkChip(g, 'guest')));
            }
        }

        function renderAbsent() {
            const el = document.getElementById('absentArea');
            el.innerHTML = '';
            const absentPeople = people.filter(p => p.absent);
            absentPeople.forEach(p => {
                const g = p.gender;
                const d = document.createElement('div');
                d.className = `chip absent-chip ${g}`;
                d.dataset.id = p.id;
                const returnBtn = `<button class="abs-btn to-return" title="復帰">↩</button>`;
                d.innerHTML = `<div class="av">${p.name.charAt(0)}</div><div class="cn">${p.name}</div>${returnBtn}`;
                d.querySelector('.abs-btn').addEventListener('click', e => {
                    e.stopPropagation();
                    markPresent(p.id);
                });
                el.appendChild(d);
            });
        }

        function mkLabel(cls, txt) {
            const d = document.createElement('div');
            d.className = 'sec-label ' + cls;
            d.textContent = txt;
            return d;
        }

        function mkChip(p, forceGender) {
            const g = forceGender || p.gender;
            const d = document.createElement('div');
            d.className = `chip ${g}`;
            d.dataset.id = p.id;
            if (sel.includes(p.id)) d.classList.add('selected');
            // 男性・女性のみ欠席ボタンを表示（ゲストは対象外）
            const absBtn = (!forceGender && (p.gender === 'male' || p.gender === 'female'))
                ? `<button class="abs-btn to-absent" title="欠席">✕</button>`
                : '';
            d.innerHTML = `<div class="av">${p.name.charAt(0)}</div><div class="cn">${p.name}</div>${absBtn}<div class="dh">⠿</div>`;
            const absBtnEl = d.querySelector('.abs-btn');
            if (absBtnEl) {
                absBtnEl.addEventListener('click', e => {
                    e.stopPropagation();
                    markAbsent(p.id);
                });
            }
            d.addEventListener('click', () => onPoolClick(p.id));
            setupDrag(d, p.id);
            return d;
        }

        function renderGuests() {
            const el = document.getElementById('guestArea');
            el.innerHTML = '';
            guests.forEach((g, i) => {
                const row = document.createElement('div');
                row.className = 'g-row';
                const tog = document.createElement('div');
                tog.className = 'g-toggle' + (g.enabled ? ' on' : '');
                tog.addEventListener('click', () => toggleGuest(i));
                const inp = document.createElement('input');
                inp.type = 'text'; inp.className = 'g-inp';
                inp.placeholder = `ゲスト${i + 1}の名前`;
                inp.value = g.name; inp.disabled = !g.enabled;
                inp.addEventListener('input', e => { guests[i].name = e.target.value; renderPool(); renderStats(); });
                inp.addEventListener('change', () => { if (g.courtId) render(); });
                row.appendChild(tog); row.appendChild(inp);
                el.appendChild(row);
            });
        }

        function toggleGuest(i) {
            const g = guests[i];
            g.enabled = !g.enabled;
            if (!g.enabled) {
                removePidFromAllCourts(g.id);
                g.courtId = null;
            }
            render();
        }

        function renderCourts() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            courts.forEach((c, i) => {
                const card = document.createElement('div');
                const full = c.pids.length >= c.max;
                card.className = 'card' + (full ? ' full' : '') + (c.wide ? ' wide' : '');
                card.dataset.cid = c.id;

                // Header
                const head = document.createElement('div');
                head.className = 'card-head';
                const nameEl = document.createElement('input');
                nameEl.type = 'text'; nameEl.className = 'cname'; nameEl.value = c.name;
                nameEl.addEventListener('change', e => { courts[i].name = e.target.value; });

                const maxLabel = document.createElement('span');
                maxLabel.style.cssText = 'font-size:10px;color:var(--muted);margin-right:4px;';
                maxLabel.textContent = c.wide ? '(2面)' : '(1面)';

                const cntEl = document.createElement('div');
                cntEl.className = 'cnt ' + (full ? 'full' : 'ok');
                cntEl.textContent = `${c.pids.length}/${c.max}`;
                head.appendChild(nameEl); head.appendChild(maxLabel); head.appendChild(cntEl);

                // Body
                const body = document.createElement('div');
                body.className = 'card-body';
                body.dataset.cid = c.id;
                if (c.pids.length === 0) {
                    body.innerHTML = `<div class="drop-hint"><div>🏸</div><div>ここにドロップ</div></div>`;
                }

                // Build: paired people first, then unpaired
                const pairedPids = new Set();
                c.pairs.forEach((pair, pairIdx) => {
                    pair.forEach(pid => pairedPids.add(pid));
                    const pA = findPerson(pair[0]);
                    const pB = findPerson(pair[1]);
                    if (pA && pB) {
                        body.appendChild(mkPairGroup(pA, pB, c.id, pairIdx));
                    }
                });
                c.pids.filter(pid => !pairedPids.has(pid)).forEach(pid => {
                    const p = findPerson(pid);
                    if (p) body.appendChild(mkCourtMem(p, c.id));
                });

                body.addEventListener('click', e => onCourtClick(c.id, e));

                card.appendChild(head);
                card.appendChild(body);
                grid.appendChild(card);
            });
        }

        function mkCourtMem(p, courtId) {
            const g = p.gender || 'guest';
            const d = document.createElement('div');
            d.className = `cmem ${g}`;
            d.dataset.id = p.id;
            if (sel.includes(p.id)) d.classList.add('selected');
            if (pairSel === p.id) d.classList.add('selected');
            d.innerHTML = `<div class="av">${p.name.charAt(0)}</div><div class="cn">${p.name}</div><button class="delbtn">✕</button>`;
            d.querySelector('.delbtn').addEventListener('click', e => { e.stopPropagation(); removeFromCourt(p.id); });
            d.addEventListener('click', e => {
                if (!e.target.classList.contains('delbtn')) onCourtMemClick(p.id, courtId);
            });
            setupDrag(d, p.id, courtId);
            return d;
        }

        function mkPairGroup(pA, pB, courtId, pairIdx) {
            const colorIdx = getPairColorIdx(courtId, pairIdx);
            const pairColor = PAIR_BG_COLORS[colorIdx];
            const wrapper = document.createElement('div');
            wrapper.className = 'pair-group';
            wrapper.style.borderColor = pairColor.border;
            if (sel.includes(pA.id) && sel.includes(pB.id)) {
                wrapper.classList.add('pair-selected');
            }

            const elA = mkCourtMem(pA, courtId);
            elA.style.flex = '1';
            elA.style.background = pairColor.bg;

            const conn = document.createElement('div');
            conn.className = 'pair-connector';
            conn.style.background = pairColor.connector;
            conn.style.cursor = 'pointer';
            conn.textContent = '↔';
            conn.title = 'ペアごと選択 → 別コートへ移動';
            conn.addEventListener('click', e => {
                e.stopPropagation();
                e.preventDefault();
                if (justDragged) return;
                const pidA = pA.id;
                const pidB = pB.id;
                const bothSelected = sel.includes(pidA) && sel.includes(pidB);
                if (bothSelected) {
                    sel = sel.filter(s => s !== pidA && s !== pidB);
                } else {
                    if (!sel.includes(pidA)) sel.push(pidA);
                    if (!sel.includes(pidB)) sel.push(pidB);
                }
                clearPairSel();
                refreshSelection();
                updateAssignBar();
                wrapper.classList.toggle('pair-selected', sel.includes(pidA) && sel.includes(pidB));
            });
            conn.addEventListener('pointerdown', e => {
                e.stopPropagation();
                drag = {
                    pid: pA.id,
                    pairPids: [pA.id, pB.id],
                    fromCourt: courtId,
                    active: false,
                    startX: e.clientX,
                    startY: e.clientY
                };
            }, { passive: true });

            const elB = mkCourtMem(pB, courtId);
            elB.style.flex = '1';
            elB.style.background = pairColor.bg;

            const unpairBtn = document.createElement('button');
            unpairBtn.className = 'unpair-btn';
            unpairBtn.textContent = '✕';
            unpairBtn.addEventListener('click', e => {
                e.stopPropagation();
                e.preventDefault();
                unpair(courtId, pairIdx);
            });
            unpairBtn.addEventListener('pointerdown', e => {
                e.stopPropagation(); // ドラッグ開始を防止
            });

            wrapper.appendChild(elA);
            wrapper.appendChild(conn);
            wrapper.appendChild(elB);
            wrapper.appendChild(unpairBtn);
            return wrapper;
        }

        // ── TAP INTERACTIONS ──────────────────────────────────
        function onPoolClick(pid) {
            clearPairSel();
            // 複数選択: トグル
            const idx = sel.indexOf(pid);
            if (idx >= 0) {
                sel.splice(idx, 1);
            } else {
                sel.push(pid);
            }
            refreshSelection();
            updateAssignBar();
        }

        function updateAssignBar() {
            const bar = document.getElementById('assignBar');
            if (sel.length === 0) {
                bar.classList.remove('show');
                return;
            }
            bar.innerHTML = '';
            // ラベル
            const label = document.createElement('span');
            label.className = 'ab-label';
            label.textContent = `${sel.length}名選択中 →`;
            bar.appendChild(label);
            // 各コートボタン
            courts.forEach(c => {
                const btn = document.createElement('button');
                btn.className = 'ab-btn';
                const remaining = c.max - c.pids.length;
                if (remaining > 0) {
                    btn.textContent = `${c.name} (残${remaining})`;
                } else if (remaining === 0) {
                    btn.textContent = `${c.name} (満員)`;
                    btn.style.opacity = '0.7';
                } else {
                    btn.textContent = `${c.name} (超過+${-remaining})`;
                    btn.style.opacity = '0.7';
                }
                btn.addEventListener('click', () => {
                    // 移動前：sel内のpid同士のペア関係を抽出
                    const pairsToTransfer = [];
                    courts.forEach(court => {
                        court.pairs.forEach(pair => {
                            if (sel.includes(pair[0]) && sel.includes(pair[1])) {
                                pairsToTransfer.push([...pair]);
                            }
                        });
                    });

                    let count = 0;
                    const toAssign = [...sel];
                    toAssign.forEach(pid => {
                        if (assign(pid, c.id)) count++;
                    });

                    // 移動先でペア再登録
                    if (count > 0) {
                        const targetCourt = courts.find(co => co.id === c.id);
                        if (targetCourt) {
                            pairsToTransfer.forEach(pair => {
                                if (targetCourt.pids.includes(pair[0]) && targetCourt.pids.includes(pair[1])) {
                                    const dup = targetCourt.pairs.some(pp =>
                                        (pp[0] === pair[0] && pp[1] === pair[1]) ||
                                        (pp[0] === pair[1] && pp[1] === pair[0])
                                    );
                                    if (!dup) targetCourt.pairs.push([...pair]);
                                }
                            });
                        }
                        sel = [];
                        updateAssignBar();
                        render();
                        toast(`${count}名を${c.name}に割り当てました！`);
                    }
                });
                bar.appendChild(btn);
            });

            // 欠席へ移動ボタン（peopleのみ対象、ゲストは除外）
            const targets = sel
                .map(id => findPerson(id))
                .filter(p => p && !guests.includes(p));
            if (targets.length > 0) {
                const absBtn = document.createElement('button');
                absBtn.className = 'ab-btn';
                absBtn.style.cssText = 'background:#94a3b815;border-color:#94a3b860;color:#475569;';
                absBtn.textContent = `🚫 欠席へ (${targets.length})`;
                absBtn.addEventListener('click', () => {
                    let count = 0;
                    targets.forEach(p => {
                        removePidFromAllCourts(p.id);
                        p.courtId = null;
                        p.absent = true;
                        count++;
                    });
                    sel = [];
                    clearPairSel();
                    saveState();
                    render();
                    if (count > 0) toast(`🚫 ${count}名を欠席にしました`);
                });
                bar.appendChild(absBtn);
            }

            // キャンセルボタン
            const cancel = document.createElement('button');
            cancel.className = 'ab-cancel';
            cancel.textContent = '✕';
            cancel.addEventListener('click', () => {
                sel = [];
                refreshSelection();
                updateAssignBar();
            });
            bar.appendChild(cancel);
            bar.classList.add('show');
        }

        function onCourtClick(courtId, e) {
            if (e.target.closest('.cmem') || e.target.closest('.pair-group')) return;
            if (sel.length > 0) {
                let count = 0;
                const toAssign = [...sel];
                toAssign.forEach(pid => {
                    if (!courts.find(c => c.id === courtId)?.pids.includes(pid)) {
                        if (assign(pid, courtId)) count++;
                    }
                });
                if (count > 0) {
                    sel = [];
                    render();
                    toast(`${count}名を割り当てました！`);
                }
            }
        }

        function onCourtMemClick(pid, courtId) {
            // If we have pool selections, assign to this court
            if (sel.length > 0) {
                let count = 0;
                const toAssign = [...sel];
                toAssign.forEach(spid => {
                    if (!courts.find(c => c.id === courtId)?.pids.includes(spid)) {
                        if (assign(spid, courtId)) count++;
                    }
                });
                if (count > 0) {
                    sel = [];
                    render();
                    toast(`${count}名を割り当てました！`);
                    return;
                }
            }
            sel = [];

            // Pair mode: if same court, pair them
            const court = courts.find(c => c.id === courtId);
            if (!court) return;
            if (!court.pids.includes(pid)) return;

            // Already in a pair? skip
            if (court.pairs.some(pair => pair.includes(pid))) {
                clearPairSel();
                refreshSelection();
                return;
            }

            if (pairSel && pairSel !== pid) {
                // Check pairSel is in same court
                if (court.pids.includes(pairSel) && !court.pairs.some(pair => pair.includes(pairSel))) {
                    makePair(courtId, pairSel, pid);
                    return;
                }
            }
            // Toggle pair selection
            if (pairSel === pid) {
                clearPairSel();
            } else {
                pairSel = pid;
                const p = findPerson(pid);
                const hint = document.getElementById('pairHint');
                hint.textContent = `🤝 ${p ? p.name : ''} のペア相手をタップしてください`;
                hint.style.display = 'block';
            }
            refreshSelection();
        }

        function refreshSelection() {
            document.querySelectorAll('[data-id]').forEach(el => {
                const isSelected = sel.includes(el.dataset.id) || el.dataset.id === pairSel;
                el.classList.toggle('selected', isSelected);
            });
        }

        // ── DRAG & DROP (Pointer Events) ───────────────────────
        let drag = { pid: null, pairPids: null, fromCourt: null, active: false, startX: 0, startY: 0 };
        let justDragged = false; // ドラッグ直後のclickをsuppress
        const ghost = document.getElementById('ghost');

        function setupDrag(el, pid, fromCourt) {
            el.addEventListener('pointerdown', e => {
                if (e.target.closest('.delbtn') || e.target.closest('.cname') ||
                    e.target.closest('.g-toggle') || e.target.closest('.g-inp') ||
                    e.target.closest('.unpair-btn') || e.target.closest('.abs-btn')) return;
                drag = { pid, fromCourt: fromCourt || null, active: false, startX: e.clientX, startY: e.clientY };
            }, { passive: true });
        }

        document.addEventListener('pointermove', e => {
            if (!drag.pid) return;
            const dx = e.clientX - drag.startX, dy = e.clientY - drag.startY;
            if (!drag.active && Math.sqrt(dx * dx + dy * dy) > 8) {
                drag.active = true;
                if (drag.pairPids) {
                    const pA = findPerson(drag.pairPids[0]);
                    const pB = findPerson(drag.pairPids[1]);
                    ghost.textContent = `🤝 ${pA ? pA.name : ''} & ${pB ? pB.name : ''}`;
                    ghost.style.display = 'block';
                    drag.pairPids.forEach(pid => {
                        const src = document.querySelector(`[data-id="${pid}"]`);
                        if (src) src.classList.add('dragging');
                    });
                } else {
                    const p = findPerson(drag.pid);
                    if (p) { ghost.textContent = '🏸 ' + p.name; ghost.style.display = 'block'; }
                    const src = document.querySelector(`[data-id="${drag.pid}"]`);
                    if (src) src.classList.add('dragging');
                }
            }
            if (!drag.active) return;
            ghost.style.left = (e.clientX - 40) + 'px';
            ghost.style.top = (e.clientY - 24) + 'px';

            ghost.style.display = 'none';
            const under = document.elementFromPoint(e.clientX, e.clientY);
            ghost.style.display = 'block';
            document.querySelectorAll('.card').forEach(c => c.classList.remove('hover'));
            const cc = under?.closest('.card');
            if (cc && !cc.classList.contains('full')) cc.classList.add('hover');
        }, { passive: true });

        document.addEventListener('pointerup', e => {
            if (!drag.pid) return;
            if (drag.active) {
                justDragged = true;
                setTimeout(() => { justDragged = false; }, 100);
                ghost.style.display = 'none';
                document.querySelectorAll('.card').forEach(c => c.classList.remove('hover'));
                const under = document.elementFromPoint(e.clientX, e.clientY);
                const cc = under?.closest('.card');

                // ペアごと移動
                if (drag.pairPids) {
                    if (cc) {
                        const toId = cc.dataset.cid;
                        if (toId && toId !== drag.fromCourt) {
                            const [pidA, pidB] = drag.pairPids;
                            assign(pidA, toId);
                            assign(pidB, toId);
                            // 移動先でペア再登録
                            const targetCourt = courts.find(co => co.id === toId);
                            if (targetCourt && targetCourt.pids.includes(pidA) && targetCourt.pids.includes(pidB)) {
                                const dup = targetCourt.pairs.some(pp =>
                                    (pp[0] === pidA && pp[1] === pidB) ||
                                    (pp[0] === pidB && pp[1] === pidA)
                                );
                                if (!dup) targetCourt.pairs.push([pidA, pidB]);
                            }
                            render();
                            toast(`ペアをコート移動しました`);
                        }
                    }
                    document.querySelectorAll('.dragging').forEach(el => el.classList.remove('dragging'));
                    drag.pid = null;
                    drag.pairPids = null;
                    drag.active = false;
                    return;
                }

                // Check if dropped on another court member (for pairing)
                const targetMem = under?.closest('.cmem');
                if (targetMem && drag.fromCourt) {
                    const targetPid = targetMem.dataset.id;
                    const court = courts.find(c => c.id === drag.fromCourt);
                    if (court && targetPid !== drag.pid &&
                        court.pids.includes(targetPid) && court.pids.includes(drag.pid) &&
                        !court.pairs.some(p => p.includes(drag.pid)) &&
                        !court.pairs.some(p => p.includes(targetPid))) {
                        makePair(drag.fromCourt, drag.pid, targetPid);
                        document.querySelectorAll('.dragging').forEach(el => el.classList.remove('dragging'));
                        drag.pid = null;
                        drag.active = false;
                        return;
                    }
                }

                if (cc) {
                    const toId = cc.dataset.cid;
                    if (toId && toId !== drag.fromCourt) {
                        if (drag.fromCourt) {
                            removePidFromAllCourts(drag.pid);
                            const p = findPerson(drag.pid);
                            if (p) p.courtId = null;
                        }
                        assign(drag.pid, toId);
                        render();
                    }
                }
                document.querySelectorAll('.dragging').forEach(el => el.classList.remove('dragging'));
            }
            drag.pid = null;
            drag.pairPids = null;
            drag.active = false;
        });

        document.addEventListener('pointercancel', () => {
            ghost.style.display = 'none';
            document.querySelectorAll('.card').forEach(c => c.classList.remove('hover'));
            document.querySelectorAll('.dragging').forEach(el => el.classList.remove('dragging'));
            drag.pid = null; drag.pairPids = null; drag.active = false;
        });

        // ── TOAST ──────────────────────────────────────────────
        function toast(msg) {
            const t = document.createElement('div');
            t.className = 'toast'; t.textContent = msg;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 3000);
        }

        // ── SCREENSHOT ────────────────────────────────────────
        function screenshotCourts() {
            const grid = document.getElementById('grid');
            if (!grid || grid.children.length === 0) {
                toast('コートにメンバーを配置してから撮影してください。');
                return;
            }
            toast('📸 撮影中...');

            // 一時的にグリッドを広げて見切れを防止
            const courtsArea = document.getElementById('courtsArea');
            const body = document.body;
            const savedOverflowBody = body.style.overflowX;
            const savedOverflowCourts = courtsArea.style.overflow;
            const savedMinWidth = grid.style.minWidth;
            const savedWidth = courtsArea.style.width;
            body.style.overflowX = 'visible';
            courtsArea.style.overflow = 'visible';
            courtsArea.style.width = 'max-content';
            grid.style.minWidth = '700px';

            html2canvas(grid, {
                backgroundColor: '#ffffff',
                scale: 2,
                useCORS: true,
                logging: false,
                windowWidth: Math.max(grid.scrollWidth, 700) + 40,
            }).then(canvas => {
                body.style.overflowX = savedOverflowBody;
                courtsArea.style.overflow = savedOverflowCourts;
                courtsArea.style.width = savedWidth;
                grid.style.minWidth = savedMinWidth;
                canvas.toBlob(blob => {
                    if (navigator.share && /Mobi|Android/i.test(navigator.userAgent)) {
                        const file = new File([blob], 'court.png', { type: 'image/png' });
                        navigator.share({ files: [file], title: 'コート振り分け' }).catch(() => {
                            downloadBlob(blob);
                        });
                    } else {
                        downloadBlob(blob);
                    }
                }, 'image/png');
            }).catch(() => {
                body.style.overflowX = savedOverflowBody;
                courtsArea.style.overflow = savedOverflowCourts;
                courtsArea.style.width = savedWidth;
                grid.style.minWidth = savedMinWidth;
                toast('撮影に失敗しました。');
            });
        }

        function downloadBlob(blob) {
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'court_' + new Date().toISOString().slice(0, 10) + '.png';
            a.click();
            URL.revokeObjectURL(url);
            toast('📸 保存しました！');
        }

        // ── COURT TOGGLE (mobile) ────────────────────────────
        let courtsCollapsed = false;

        function toggleCourts() {
            courtsCollapsed = !courtsCollapsed;
            const area = document.getElementById('courtsArea');
            const handle = document.getElementById('courtHandle');
            if (courtsCollapsed) {
                area.classList.add('collapsed');
                handle.classList.add('collapsed');
                handle.querySelector('.handle-label').textContent = 'コートを表示';
            } else {
                area.classList.remove('collapsed');
                handle.classList.remove('collapsed');
                handle.querySelector('.handle-label').textContent = 'コートエリア';
            }
        }

        // ── 大会ペアUI イベントバインド ───────────────────────
        function bindTournamentPairUI() {
            const addBtn = document.getElementById('tpAddBtn');
            const applyBtn = document.getElementById('tpApplyBtn');
            const releaseBtn = document.getElementById('tpReleaseBtn');
            const selA = document.getElementById('tpSelA');
            const selB = document.getElementById('tpSelB');
            if (!addBtn || !applyBtn || !releaseBtn || !selA || !selB) return;

            addBtn.addEventListener('click', () => {
                const a = selA.value;
                const b = selB.value;
                if (!a || !b) {
                    toast('選手Aと選手Bを両方選んでください。');
                    return;
                }
                addTournamentPair(a, b);
            });

            applyBtn.addEventListener('click', applyTournamentPairs);
            releaseBtn.addEventListener('click', releaseTournamentPairs);

            // 大会名編集ボタン（summaryクリックでdetails開閉が走らないようstopPropagation）
            const editNameBtn = document.getElementById('tpEditNameBtn');
            if (editNameBtn) {
                editNameBtn.addEventListener('click', e => {
                    e.stopPropagation();
                    e.preventDefault();
                    const next = prompt('大会名を入力（空欄でクリア）:', tournamentName || '');
                    if (next !== null) setTournamentName(next);
                });
            }
        }

        // ── START ──────────────────────────────────────────────
        initState();
        loadTournamentPairs();
        if (loadState()) {
            toast('前回保存したコート割を復元しました。');
        }
        bindTournamentPairUI();
        render();

        // ── PWA Service Worker 登録 ─────────────────────────
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('service-worker.js').catch(err => {
                    console.warn('SW registration failed:', err);
                });
            });
        }
    </script>
</body>
